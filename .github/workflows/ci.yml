name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate web app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          set -euxo pipefail

          echo "Node version:"
          node -v

          echo "Corepack version:"
          corepack --version

          echo "pnpm version:"
          pnpm -v

          echo "Registry:"
          pnpm config get registry
          npm config get registry

          echo "Proxy environment:"
          env | grep -i proxy || true

          echo "Checking npm registry reachability:"
          npm view @eslint/js version --registry=https://registry.npmjs.org/
          npm view @tiptap/react version --registry=https://registry.npmjs.org/
          npm view @tiptap/starter-kit version --registry=https://registry.npmjs.org/

          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile --reporter=append-only
          else
            echo "pnpm-lock.yaml is missing; installing with --no-frozen-lockfile until the lockfile is committed."
            pnpm install --no-frozen-lockfile --reporter=append-only
          fi

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build
